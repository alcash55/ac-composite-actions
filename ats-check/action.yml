# https://blog.apilayer.com/everything-you-need-to-know-for-the-resume-parser-api/
name: ATS Check
description: Parse a resume PDF and score its ATS compatibility

inputs:
  RESUME:
    description: Path to the resume PDF file (relative to the repo root)
    required: true
  APILAYER_API_KEY:
    description: API key for the APILayer Resume Parser
    required: true

outputs:
  ATS_SCORE:
    description: Overall ATS compatibility score (0-100) — 70 or above is considered passing
    value: ${{ steps.ats_check.outputs.ATS_SCORE }}
  ATS_REPORT:
    description: Detailed ATS compatibility report as a markdown string
    value: ${{ steps.ats_check.outputs.ATS_REPORT }}
  ATS_PASSED:
    description: Boolean — true if the score is 70 or above
    value: ${{ steps.ats_check.outputs.ATS_PASSED }}

runs:
  using: "composite"
  steps:
    - name: Debug env
      shell: bash
      run: |
        echo "RESUME_PARSER_API_KEY is set: ${{ inputs.APILAYER_API_KEY != '' }}"
        echo "RESUME input: ${{ inputs.RESUME }}"

    - name: ATS Check
      id: ats_check
      shell: bash
      run: |
        cd ${{ github.action_path }}
        if [ -z "$RESUME_PARSER_API_KEY" ]; then
          echo "ERROR: RESUME_PARSER_API_KEY env var is empty."
          echo "Input length: ${#RESUME_PARSER_API_KEY}"
          echo "Raw input value repr: '$(echo -n "$RESUME_PARSER_API_KEY" | xxd | head -1)'"
          exit 1
        fi
        yarn
        yarn ats-check
      env:
        RESUME: ${{ github.workspace }}/${{ inputs.RESUME }}
        RESUME_PARSER_API_KEY: ${{ inputs.APILAYER_API_KEY }}
